<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Left Section -->
        <div class="left-section">
            <img src="your-picture.jpg" alt="Your Picture" class="profile-pic">
            <h2>Your Name</h2>
            <p>Your Profession or Hobby</p>
            <div class="links">
                <a href="https://github.com">GitHub</a>
                <a href="https://linkedin.com">LinkedIn</a>
                <a href="mailto:youremail@example.com">Email Me</a>
            </div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <h1>About Me</h1>
            <p>
                Hello! I'm [Your Name], a passionate [your profession/hobby]. 
                I enjoy working on projects that [your interests].
            </p>
            <p>
                Feel free to explore my work and reach out if you'd like to connect!
            </p>
        </div>
    </div>
</body>
</html>
